<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3.2 - Bootstrap Grid System</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center mb-4">Bootstrap Grid System</h1>
    <p class="text-center text-muted mb-5">
        Demonstration of <strong>.container</strong>, <strong>.row</strong>, and <strong>.col-*</strong> classes.
    </p>

    <!-- First Row -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h4>Column 1</h4>
                    <p>Width: 4/12</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h4>Column 2</h4>
                    <p>Width: 4/12</p>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h4>Column 3</h4>
                    <p>Width: 4/12</p>
                </div>
            </div>
        </div>

    </div>

    <!-- Second Row -->
    <div class="row">

        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <h4>Column 1</h4>
                    <p>Width: 6/12</p>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-body">
                    <h4>Column 2</h4>
                    <p>Width: 6/12</p>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
